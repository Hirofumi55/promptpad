<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- 背景: 角丸四角形 グラデーション -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- 光沢レイヤー -->
  <rect width="32" height="16" rx="7" fill="url(#shine)"/>
  <!-- テキスト行 (プロンプトを象徴) -->
  <rect x="7" y="9" width="15" height="2.5" rx="1.25" fill="white" opacity="0.95"/>
  <rect x="7" y="14" width="11" height="2.5" rx="1.25" fill="white" opacity="0.85"/>
  <rect x="7" y="19" width="13" height="2.5" rx="1.25" fill="white" opacity="0.75"/>
  <!-- コピー完了ドット: 右下 -->
  <circle cx="24.5" cy="23.5" r="5" fill="#34d399"/>
  <path d="M22.2 23.5l1.5 1.5 3-3" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
